# Database — canonical env-var names per docs/architecture/README.md §7
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/digitalwallet}

# No auto-DDL — Flyway is the migration engine
quarkus.hibernate-orm.database.generation=none

# Dev-services disabled (we use Testcontainers explicitly in Phase 1+)
quarkus.datasource.devservices.enabled=false

# Redis
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# JWT verification (key material arrives in Phase 1; disabled in Phase 0 so the build is green
# without a real key. Phase 1 flips smallrye-jwt back on and provides JWT_PUBLIC_KEY.)
quarkus.smallrye-jwt.enabled=false
mp.jwt.verify.issuer=${JWT_ISSUER:digitalwallet-dev}
