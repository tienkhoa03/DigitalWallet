# =============================================================================
# Database — canonical env-var names per docs/architecture/README.md §7
# =============================================================================
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER}
quarkus.datasource.password=${DB_PASSWORD}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/digitalwallet}

# No auto-DDL — Flyway is the migration engine (backend_coding.md §13)
quarkus.hibernate-orm.database.generation=none

# Dev-services disabled (we use Testcontainers explicitly in Phase 1+)
quarkus.datasource.devservices.enabled=false

# =============================================================================
# Flyway
# =============================================================================
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.baseline-on-migrate=false

# =============================================================================
# Redis
# =============================================================================
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# =============================================================================
# JWT verification — SmallRye JWT (issuer-side keys configured in app.jwt.* below)
# =============================================================================
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.publickey.location=META-INF/jwt-public-key-dev.pem
mp.jwt.verify.issuer=${JWT_ISSUER:digitalwallet}
mp.jwt.verify.audiences=${JWT_AUDIENCE:digitalwallet-api}
smallrye.jwt.expiration.grace=30
smallrye.jwt.verify.algorithm=ES256
smallrye.jwt.require.named-principal=true

# =============================================================================
# JWT issuance (app-owned namespace; mirrors mp.jwt.verify.* shape)
# =============================================================================
app.jwt.issuer=${JWT_ISSUER:digitalwallet}
app.jwt.audience=${JWT_AUDIENCE:digitalwallet-api}
app.jwt.ttl-seconds=3600
# JWT_PRIVATE_KEY is supplied via env var only — no committed default (security.md §1).
# Literal "\n" sequences are unescaped at parse time by JwtSigningKeyProvider.
app.jwt.private-key=${JWT_PRIVATE_KEY:}

# =============================================================================
# Argon2id parameters (OWASP 2024 minimums; overridable per profile)
# =============================================================================
app.argon2.memory-kb=65536
app.argon2.iterations=3
app.argon2.parallelism=1

# =============================================================================
# Logging — placeholder-style; NEVER log password_hash / Authorization / Idempotency-Key
# (backend_coding.md §11, security.md §7)
# =============================================================================
quarkus.log.console.format=%d{HH:mm:ss.SSS} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.level=INFO
quarkus.log.category."com.digitalwallet".level=INFO
