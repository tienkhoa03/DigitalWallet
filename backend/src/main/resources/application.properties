# DigitalWallet backend configuration.
# Source: docs/architecture/README.md §7. Secrets MUST resolve to env vars with no committed
# default (.claude/rules/security.md §1).

# ----- HTTP -------------------------------------------------------------------
quarkus.http.port=8080
quarkus.http.test-port=0
quarkus.http.access-log.enabled=true

# ----- Database (Postgres 16; project-info.md §4.3) ---------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/digitalwallet}
quarkus.datasource.username=${DB_USER:digitalwallet}
quarkus.datasource.password=${DB_PASSWORD:}

# Hibernate — NO auto-DDL; Flyway is the only schema source (backend_coding.md §13).
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# Flyway — versioned SQL only, forward-only.
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=false
quarkus.flyway.locations=classpath:db/migration

# ----- Redis 7 (locks, fraud counters, idempotency, FX cache) -----------------
quarkus.redis.hosts=${REDIS_URL:redis://localhost:6379}

# ----- Kafka (project-info.md §4.4) ------------------------------------------
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# ----- JWT (ADR #1: ES256; security.md §2) -----------------------------------
mp.jwt.verify.publickey=${JWT_PUBLIC_KEY:}
mp.jwt.verify.issuer=digitalwallet
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY:}

# ----- LLM (ADR #2 — provider TBD) -------------------------------------------
app.llm.api-key=${LLM_API_KEY:}
app.llm.base-url=${LLM_BASE_URL:}

# ----- Fraud thresholds (docs/architecture/README.md §7) ---------------------
app.fraud.velocity.window-seconds=${FRAUD_VELOCITY_WINDOW_SECONDS:60}
app.fraud.velocity.threshold=${FRAUD_VELOCITY_THRESHOLD:5}
app.fraud.volume.window-seconds=${FRAUD_VOLUME_WINDOW_SECONDS:3600}
app.fraud.volume.threshold=${FRAUD_VOLUME_THRESHOLD:50000}
app.fraud.suspension.breach-count=${FRAUD_SUSPENSION_BREACH_COUNT:3}
app.fraud.suspension.window-seconds=${FRAUD_SUSPENSION_WINDOW_SECONDS:3600}

# ----- Rate limits (security.md §8) ------------------------------------------
app.ratelimit.transfer.per-minute=${RATELIMIT_TRANSFER_PER_MINUTE:10}
app.ratelimit.advisor.per-hour=${RATELIMIT_ADVISOR_PER_HOUR:5}

# ----- FX cache --------------------------------------------------------------
app.fx.rate-ttl-seconds=${FX_RATE_TTL_SECONDS:300}

# ----- OpenAPI ---------------------------------------------------------------
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true

# ----- CORS (security.md §5: never `*` in non-dev) ---------------------------
quarkus.http.cors=true

# ============================================================
# Profile: dev
# ============================================================
%dev.quarkus.log.console.level=DEBUG
%dev.quarkus.http.cors.origins=http://localhost:5173
%dev.quarkus.hibernate-orm.log.sql=true

# ============================================================
# Profile: test (Testcontainers spin up Postgres / Kafka / Redis — testing.md §2.4)
# ============================================================
%test.quarkus.flyway.migrate-at-start=true
%test.quarkus.log.console.level=INFO
# DB / Kafka / Redis URLs come from Testcontainers via @QuarkusTestResource.

# ============================================================
# Profile: prod
# ============================================================
%prod.quarkus.log.console.level=INFO
%prod.quarkus.http.cors.origins=${ALLOWED_ORIGINS}
# Security headers — security.md §5
%prod.quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains
%prod.quarkus.http.header."X-Frame-Options".value=DENY
%prod.quarkus.http.header."X-Content-Type-Options".value=nosniff
%prod.quarkus.http.header."Referrer-Policy".value=strict-origin-when-cross-origin
%prod.quarkus.http.header."Permissions-Policy".value=geolocation=(), microphone=(), camera=(), payment=()
