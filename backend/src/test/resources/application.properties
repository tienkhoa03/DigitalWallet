# =============================================================================
# Test profile — Phase 1
# Testcontainers manages DB lifecycle; JWT verification keys point at the committed
# test keypair under src/test/resources/META-INF/.
# =============================================================================

# Datasource — credentials default to standard Testcontainers Postgres image defaults;
# PostgresTestResource overrides at runtime with the actual container's URL/user/password.
quarkus.datasource.username=test
quarkus.datasource.password=test
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/test

# Flyway: run V1 against the Testcontainers Postgres on each test class
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=false

# JWT verification: point at the committed test public key
mp.jwt.verify.publickey.location=META-INF/jwt-public-key-test.pem
mp.jwt.verify.issuer=digitalwallet
mp.jwt.verify.audiences=digitalwallet-api
smallrye.jwt.verify.algorithm=ES256
smallrye.jwt.expiration.grace=30

# JWT issuance: the committed test private key, as a single line with literal "\n" escapes.
# Properties.load() unescapes \\n -> \n, so JwtSigningKeyProvider.replace("\\n", "\n") then
# rebuilds the physical newlines.
app.jwt.issuer=digitalwallet
app.jwt.audience=digitalwallet-api
app.jwt.ttl-seconds=3600
app.jwt.private-key=-----BEGIN PRIVATE KEY-----\\nMIGHAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBG0wawIBAQQgaF3fJCZ8mGyqSmDA\\no3VqEgKBh50WKUjjy6PytG9TnzShRANCAASfwk2ZFxcbQicjo+A+mC7zmvK4ldr/\\n0MAfy73rLAkc+bHyLF4KIrq9QFMCeIgX1uHaKYDAGpwIa+pQSh+0YFcv\\n-----END PRIVATE KEY-----

# Reduced Argon2 cost so unit tests on the AuthService stay snappy (Phase 1 plan §14 Risks).
# Production keeps the 64 MiB OWASP minimum.
app.argon2.memory-kb=4096
app.argon2.iterations=2
app.argon2.parallelism=1

# Disable redis in tests until Phase 3 wires it
quarkus.redis.devservices.enabled=false
quarkus.redis.hosts=redis://localhost:6379

quarkus.log.level=INFO
quarkus.log.category."com.digitalwallet".level=DEBUG
