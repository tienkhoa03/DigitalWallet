# Test-profile overrides for the Phase B skeleton smoke test.
# Quarkus Dev Services use Testcontainers under the hood (Postgres / Redis / Redpanda),
# which satisfies the "Testcontainers only" rule in .claude/rules/testing.md §2.4.
quarkus.datasource.devservices.enabled=true
quarkus.redis.devservices.enabled=true
quarkus.kafka.devservices.enabled=true

# Skeleton has no Flyway migrations needed by tests yet; V1 will still apply against
# the dev-service Postgres because migrate-at-start defaults to true. Leave it on.

# Stub JWT verification key so smallrye-jwt boots in tests without a real keypair.
mp.jwt.verify.publickey=NONE
smallrye.jwt.sign.key.location=
