# Backend + infra compose stack.
#
# Tiers (selected via Compose profiles, --profile <name>):
#   • (no profile)  — Postgres 16, Kafka KRaft 3.7, Redis 7 only. Use when running
#                     Quarkus locally with `./mvnw quarkus:dev` for hot reload.
#   • --profile app — adds the containerised Quarkus backend built from ./Dockerfile.
#                     Use for production-like local runs and CI smoke.
#
# Network: this compose owns the `dw-net` bridge. The frontend compose joins it as
# external; start backend first, then frontend.
#
# Reference: .claude/rules/security.md §1 (secrets via env vars, no committed defaults).

name: digitalwallet-backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: dw-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-digitalwallet}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-digitalwallet}
      POSTGRES_DB: ${DB_NAME:-digitalwallet}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-digitalwallet} -d ${DB_NAME:-digitalwallet}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dw-net

  kafka:
    image: bitnami/kafka:3.7
    container_name: dw-kafka
    restart: unless-stopped
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://${KAFKA_ADVERTISED_HOST:-localhost}:${KAFKA_HOST_PORT:-9092}"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - dw-net

  redis:
    image: redis:7-alpine
    container_name: dw-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - dw-net

  backend:
    # Optional containerised Quarkus app — opt in via `--profile app`.
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
    image: digitalwallet/backend:${BACKEND_IMAGE_TAG:-local}
    container_name: dw-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Inside the dw-net network the services resolve by container name.
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-digitalwallet}
      DB_USER: ${DB_USER:-digitalwallet}
      DB_PASSWORD: ${DB_PASSWORD:-digitalwallet}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      # Secrets — security.md §1, no committed defaults.
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:?JWT_PUBLIC_KEY is required (see backend/.env.template)}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY is required (see backend/.env.template)}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      # CORS — when nginx (frontend) proxies /api, requests arrive same-origin and CORS is moot.
      # When frontend hits backend directly (e.g. dev), ALLOWED_ORIGINS gates it.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:${FRONTEND_HOST_PORT:-8090}}
      # Fraud thresholds + rate limits — docs/architecture/README.md §7
      FRAUD_VELOCITY_WINDOW_SECONDS: ${FRAUD_VELOCITY_WINDOW_SECONDS:-60}
      FRAUD_VELOCITY_THRESHOLD: ${FRAUD_VELOCITY_THRESHOLD:-5}
      FRAUD_VOLUME_WINDOW_SECONDS: ${FRAUD_VOLUME_WINDOW_SECONDS:-3600}
      FRAUD_VOLUME_THRESHOLD: ${FRAUD_VOLUME_THRESHOLD:-50000}
      FRAUD_SUSPENSION_BREACH_COUNT: ${FRAUD_SUSPENSION_BREACH_COUNT:-3}
      FRAUD_SUSPENSION_WINDOW_SECONDS: ${FRAUD_SUSPENSION_WINDOW_SECONDS:-3600}
      RATELIMIT_TRANSFER_PER_MINUTE: ${RATELIMIT_TRANSFER_PER_MINUTE:-10}
      RATELIMIT_ADVISOR_PER_HOUR: ${RATELIMIT_ADVISOR_PER_HOUR:-5}
      FX_RATE_TTL_SECONDS: ${FX_RATE_TTL_SECONDS:-300}
      QUARKUS_PROFILE: ${QUARKUS_PROFILE:-prod}
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/q/health/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 30s
    networks:
      - dw-net

volumes:
  postgres-data:
  kafka-data:
  redis-data:

networks:
  dw-net:
    name: dw-net
    driver: bridge
