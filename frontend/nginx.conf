# DigitalWallet frontend nginx config.
# Serves the Vite build statically and reverse-proxies REST/WebSocket traffic to the
# Quarkus backend at `${BACKEND_HOST}:${BACKEND_PORT}` (resolved on the shared
# `dw-net` Docker network). Headers per .claude/rules/security.md §5.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream digitalwallet_backend {
    # Container name from backend/docker-compose.yml. Both composes attach to dw-net.
    server dw-backend:8080;
}

server {
    listen       80 default_server;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ---- Security headers (security.md §5; HSTS only meaningful behind HTTPS) -----
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
    add_header Content-Security-Policy   "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; frame-ancestors 'none'" always;

    # ---- Health for compose / orchestrator probes --------------------------------
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # ---- REST API proxy ----------------------------------------------------------
    location /api/ {
        # Strip the /api prefix before forwarding to Quarkus.
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass         http://digitalwallet_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ---- WebSocket proxy (fraud alerts, notifications, advisor reply) ------------
    # Endpoints from .claude/rules/backend_coding.md §16:
    #   /admin/ws/alerts, /admin/ws/metrics, /users/ws/notifications, advisor reply.
    location ~ ^/(admin/ws|users/ws|advisor/ws) {
        proxy_pass         http://digitalwallet_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ---- SPA fallback ------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- Static asset caching (Vite emits content-hashed filenames) --------------
    location ~* \.(?:js|css|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico|map)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}
