# Frontend compose stack.
#
# Owns only the nginx container that serves the built Vite bundle and reverse-proxies
# `/api/*` (and WebSocket upgrades) to the backend. Joins the `dw-net` network owned
# by backend/docker-compose.yml — START THE BACKEND COMPOSE FIRST.
#
#   docker compose -f backend/docker-compose.yml --profile app up -d
#   docker compose -f frontend/docker-compose.yml up -d
#
# Without --profile app on the backend compose, only Postgres/Kafka/Redis come up and
# the frontend proxy will 502 because no `dw-backend` container exists.

name: digitalwallet-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    image: digitalwallet/frontend:${FRONTEND_IMAGE_TAG:-local}
    container_name: dw-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_HOST_PORT:-8090}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    networks:
      - dw-net

networks:
  # External — created and owned by backend/docker-compose.yml.
  dw-net:
    external: true
    name: dw-net
