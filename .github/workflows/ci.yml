# CI pipeline — derived from .claude/rules/testing.md §4.2 ("Full CI").
# Gate set:
#   1. Compile (backend + frontend).
#   2. Backend unit + integration tests (JUnit 5 + Testcontainers).
#   3. JaCoCo service-layer coverage gate (≥80 %, NFR4).
#   4. Frontend lint.
#   5. Frontend tests.
#   6. Container image smoke — verify backend/ and frontend/ Dockerfiles still build.
# Playwright E2E runs as a non-blocking nightly suite (deferred).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Quarkus + JaCoCo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify (compile + unit + integration + JaCoCo gate)
        run: ./mvnw -B verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable pnpm via Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.1.2 --activate

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test (Vitest, non-interactive)
        run: pnpm test

      - name: Build
        run: pnpm build

  docker-images:
    name: Docker images (smoke build)
    runs-on: ubuntu-latest
    # Validates that backend/ and frontend/ Dockerfiles still build after a refactor.
    # Does not push — pure verification gate.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (JVM, no push)
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          load: false
          tags: digitalwallet/backend:ci

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          load: false
          tags: digitalwallet/frontend:ci

      - name: Validate compose configs
        run: |
          docker compose -f backend/docker-compose.yml  config --quiet
          # Frontend compose joins an external network owned by the backend compose,
          # so `config` may report a warning about the unmanaged network — that's
          # expected. Use --no-interpolate to keep the check pure-syntactic.
          docker compose -f frontend/docker-compose.yml config --no-interpolate --quiet
